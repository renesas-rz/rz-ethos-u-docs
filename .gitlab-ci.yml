stages:
  - check
  - build
  - deploy

image: "gitlab.global.renesas.com:5005/spl2/continuous-integration/dockerfiles:ubuntu-24.04-latest"

default:
  tags:
    - spl2
    - small

variables:
  RSYNC_FLAGS: "-az --delete"
  # Ensure full git history for date plugins
  GIT_DEPTH: "0"

.default_python: &default_python
  before_script:
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

# ---------- Check ----------
# Code quality check
pre_commit:
  stage: check
  <<: *default_python
  script:
    - pre-commit install
    - pre-commit run -a || (git diff && exit 1)
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'

# ---------- Build ----------
# Uses mkdocs.yml for prod pipelines, mkdocs.staging.yml for MR pipelines.
build_docs:
  stage: build
  needs: []
  <<: *default_python
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        echo "Building STAGING with mkdocs.staging.yml"
        mkdocs build --strict --clean -f mkdocs.staging.yml
      else
        echo "Building PRODUCTION with mkdocs.yml"
        mkdocs build --strict --clean -f mkdocs.yml
      fi
  artifacts:
    name: "ethos-u-docs-site-$CI_COMMIT_SHORT_SHA"
    paths:
      - site/
    expire_in: 2 weeks
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'

# ---------- Deploy STAGING (MR previews on external server) ----------
deploy_staging:
  stage: deploy
  needs: ["build_docs"]
  environment:
    name: staging/$CI_MERGE_REQUEST_IID
    url: $STAGING_SITE_BASE_URL/mr-$CI_MERGE_REQUEST_IID/
    on_stop: stop_staging
    auto_stop_in: 1 week
  variables:
    STAGING_TARGET: "${STAGING_DEPLOY_PATH}/mr-${CI_MERGE_REQUEST_IID}/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  script:
    - rsync $RSYNC_FLAGS -e "ssh -p 22" site/ "$STAGING_DEPLOY_USER@$STAGING_DEPLOY_HOST:$STAGING_TARGET"

# ---------- Comment the MR with the preview link ----------
comment_mr_staging_link:
  stage: deploy
  needs: ["deploy_staging"]
  variables:
    STAGING_URL: "${STAGING_SITE_BASE_URL}/mr-${CI_MERGE_REQUEST_IID}/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - when: never
  script:
    - >
      curl --silent --fail --request POST
      --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN"
      --data-urlencode "body=✅ Staging preview deployed: ${STAGING_URL}"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
  retry:
    max: 2

# ---------- Auto-clean preview when MR closes/merges ----------
stop_staging:
  stage: deploy
  environment:
    name: staging/$CI_MERGE_REQUEST_IID
    action: stop
  variables:
    STAGING_TARGET: "${STAGING_DEPLOY_PATH}/mr-${CI_MERGE_REQUEST_IID}/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - when: never
  script:
    - ssh -p "22" "$STAGING_DEPLOY_USER@$STAGING_DEPLOY_HOST" "rm -rf '$STAGING_TARGET'"
    - >
      curl --silent --fail --request POST
      --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN"
      --data-urlencode "body=🧹 Staging preview destroyed"
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"

# ---------- Publish PRODUCTION via GitLab Pages (master branch only) ----------
deploy_production:
  stage: deploy
  needs: ["build_docs"]
  script:
    - echo "Nothing to do here"
  pages:
    publish: site
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  environment:
    name: production
    url: $CI_PAGES_URL
